{% extends 'inventory/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card-custom text-center" style="border-top: 4px solid #ef4444;">
            <div class="mb-4">
                <i class="bi bi-trash3-fill text-danger" style="font-size: 3rem;"></i>
            </div>
            
            <h3 class="fw-bold mb-3">¿Eliminar el rol "{{ object.nombre_rol }}"?</h3>
            <p style="color: var(--text-secondary);">
                Si eliminas este rol, los porcentajes actuales se desajustarán. 
                Si este rol ya no se usa, te recomendamos simplemente <strong>desactivarlo</strong> editándolo.
            </p>

            <form method="post" class="mt-4 d-flex justify-content-center gap-3">
                {% csrf_token %}
                <a href="{% url 'reglas_lista' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                <button type="submit" class="btn btn-danger px-4">Sí, Eliminar</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
