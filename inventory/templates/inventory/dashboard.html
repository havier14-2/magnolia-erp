{% extends 'inventory/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Resumen General</h2>
    <button class="btn btn-primary" style="background-color: var(--accent); border: none;">
        <i class="bi bi-cloud-upload me-2"></i>Subir Ventas CSV
    </button>
</div>

<div class="row g-4 mb-4">
    <div class="col-md-4">
        <div class="card-custom">
            <h6 class="text-muted">Costo Promedio Insumos</h6>
            <h3 class="mb-0 fw-bold">$4,500 <small class="text-success" style="font-size: 0.5em;"><i class="bi bi-arrow-down-short"></i>1.2%</small></h3>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card-custom">
            <h6 class="text-muted">Margen de Ganancia Global</h6>
            <h3 class="mb-0 fw-bold" style="color: var(--accent);">68.5%</h3>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card-custom">
            <h6 class="text-muted">Alertas de Stock Min.</h6>
            <h3 class="mb-0 fw-bold text-danger">3 <small style="font-size: 0.5em;">Insumos</small></h3>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card-custom" style="min-height: 400px; display: flex; align-items: center; justify-content: center;">
            <p class="text-muted">Aquí irá el gráfico Chart.js de variabilidad de costos</p>
        </div>
    </div>
</div>
{% endblock %}
