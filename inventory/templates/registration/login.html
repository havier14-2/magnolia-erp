<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnolia ERP | Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-main: #121212;
            --bg-surface: #1E1E1E;
            --accent: #D4AF37; /* Dorado Magnolia */
            --text-primary: #E0E0E0;
            --text-secondary: #A0A0A0;
            --border: #333333;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .form-control {
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.8rem;
        }
        .form-control:focus {
            background-color: var(--bg-main);
            border-color: var(--accent);
            color: var(--text-primary);
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
        }
        .btn-magnolia {
            background-color: var(--accent);
            color: var(--bg-main);
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-magnolia:hover {
            background-color: #bfa136;
            color: var(--bg-main);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <div class="mb-4">
            <i class="bi bi-box-seam-fill" style="font-size: 3rem; color: var(--accent);"></i>
            <h2 class="fw-bold mt-2" style="letter-spacing: 2px;">MAGNOLIA</h2>
            <p class="text-secondary small">Sistema de Gestión y Bodega</p>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger py-2 small" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold text-secondary">Usuario</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-secondary">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-magnolia w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-2"></i> Ingresar al Sistema
            </button>
        </form>
    </div>

</body>
</html>
